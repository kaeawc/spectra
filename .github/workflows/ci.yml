name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_call:

permissions:
  checks: write
  contents: read

jobs:
  # macos-latest is required: detection shells out to plutil, otool,
  # codesign, file, and sqlite3 — all macOS-only utilities.
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -o spectra ./cmd/spectra/

      - name: go test (with junit)
        run: |
          gotestsum --junitfile junit-report.xml --format standard-verbose -- -count=1 -race ./...

      - name: Check if test reports were created
        id: junit-reports-exist
        uses: andstor/file-existence-action@v3
        with:
          files: junit-report.xml

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: steps.junit-reports-exist.outputs.files_exists == 'true'
        with:
          report_paths: junit-report.xml

      - name: Smoke test against system apps
        run: |
          ./spectra /System/Applications/Calculator.app
          ./spectra --json /System/Applications/Chess.app | python3 -m json.tool

  complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
      - name: Run gocyclo
        run: gocyclo -over 15 -ignore '_test\.go$' .

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run

  check-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest
      - name: Run go-licenses
        run: go-licenses report ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: |
          # Excluded rules:
          #   G104 — best-effort cleanup of os.Remove etc. is intentional
          #   G204 — invoking fixed macOS utilities is the inspection model
          #   G304 — Detect, scanStorage take filesystem paths as input by design
          #   G602 — false positive on byte conversion of UintN(256)
          #   G703 — same path-as-input rationale as G304
          #   G704 — URL is caller input by design
          gosec -exclude=G104,G204,G304,G602,G703,G704 -fmt=junit-xml -out=gosec-report.xml -stdout ./...

      - name: Check if security report was created
        id: gosec-report-exists
        uses: andstor/file-existence-action@v3
        with:
          files: gosec-report.xml

      - name: Publish Security Report
        uses: mikepenz/action-junit-report@v6
        if: steps.gosec-report-exists.outputs.files_exists == 'true'
        with:
          report_paths: gosec-report.xml

  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Validate workflows + shell scripts
        run: ./scripts/validate-workflows.sh

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # validate_lychee.sh consults git history for renamed files

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material

      - name: Install lychee
        run: ./scripts/lychee/install_lychee.sh

      - name: Validate mkdocs nav
        run: ./scripts/validate_mkdocs_nav.sh

      - name: Validate links (lychee)
        run: ./scripts/lychee/validate_lychee.sh

      - name: MkDocs build (strict)
        run: mkdocs build --strict
